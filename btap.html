<!DOCTYPE html>
<html>
<body>
<p id="result"></p>

<script>
function showInfo() {
  var fullName = "Nguyen Hoang Bao Quyen";
  var studentId = "27A4042981";

  var parts = fullName.toLowerCase().split(" ");
  var lastName = parts[parts.length - 1];
  var initials = "";
  for (var i = 0; i < parts.length - 1; i++) {
    initials += parts[i][0];
  }

  var email = lastName + initials + "." + studentId.toLowerCase() + "@hvnh.edu.vn";

  var coursePeriod = studentId.substring(0, 2);

  var facultyCode = studentId.substring(3, 6);
  var faculty = "";
  if (facultyCode === "404") {
    faculty = "CNTT";
  } else {
    faculty = facultyCode;
  }

  var last4 = studentId.substring(studentId.length - 4);
  var sum = 0;
  for (var i = 0; i < last4.length; i++) {
    sum += parseInt(last4[i]);
  }

  document.getElementById("result").innerText ="Email: " + email + "\n" + "Xin chào " + fullName + ", bạn là sinh viên khóa " + coursePeriod + ", khoa " + faculty + ", tổng 4 số cuối trong mã sinh viên là " + sum;
}

showInfo();
</script>

</body>
</html>
