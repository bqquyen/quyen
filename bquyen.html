<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiem tra mat khau</title>
</head>
<body>

<h2>Kiem tra mat khau</h2>

<script>
function loimk(mk){
    let loi = [];
    !/[A-Z]/.test(mk) && loi.push("thieu chu hoa");
    !/[a-z]/.test(mk) && loi.push("thieu chu thuong");
    !/\d/.test(mk) && loi.push("thieu so");
    !/[\W_]/.test(mk) && loi.push("thieu ky tu dac biet");
    mk.length < 8 && loi.push("thieu do dai toi thieu 8 ky tu");

    return loi;
}

function domanh(mk){
    return mk.length === 8 ? "yeu vo cung"
         : mk.length < 12 ? "trung binh"
         : "rat manh";
}

function nhapmk(){
    let mk = prompt("Nhap mat khau it nhat 8 ky tu");
    let loi = loimk(mk);

    while (loi.length > 0){
        alert("Mat khau khong hop le\n" + loi.join("\n"));
        mk = prompt("Nhap lai mat khau");
        loi = loimk(mk);
    }

    alert("Mat khau hop le do manh: " + domanh(mk));
}

nhapmk();
</script>

</body>
</html>
